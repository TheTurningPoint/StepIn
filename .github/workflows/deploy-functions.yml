name: Deploy Edge Functions

# Deploys Supabase Edge Functions from this repo so they don't have to be
# pasted into the dashboard editor by hand. Runs on demand, or when a function
# changes on this branch.
on:
  workflow_dispatch:
  push:
    branches: [claude/claude-md-docs-kgcw9e]
    paths: ["supabase/functions/**"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_ID: vhxswxilkuwsxwpsdjxl
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      # login2 is the new token-issuing login; --no-verify-jwt lets the app
      # call it with just the public key (same as a normal login endpoint).
      - run: supabase functions deploy login2 --project-ref "$PROJECT_ID" --no-verify-jwt

      # reminders: daily email nudges. Guards itself with the CRON_SECRET header,
      # so it ships with --no-verify-jwt like login2. Needs Edge Function secrets
      # CRON_SECRET (always) and RESEND_API_KEY (or it runs in dry-run mode).
      - run: supabase functions deploy reminders --project-ref "$PROJECT_ID" --no-verify-jwt

      # pinreset: owner/manager self-serve PIN reset via emailed code. Public
      # (--no-verify-jwt); guards itself with generic responses, expiring single-
      # use codes, and a try cap. Needs RESEND_API_KEY (or dry-run logs the code).
      - run: supabase functions deploy pinreset --project-ref "$PROJECT_ID" --no-verify-jwt

      # provisionorg: vendor-only new-customer provisioning. Public (--no-verify-jwt)
      # but gated by the ADMIN_SECRET Edge Function secret. Used by admin.html.
      - run: supabase functions deploy provisionorg --project-ref "$PROJECT_ID" --no-verify-jwt

      # Health check: a deliberately-wrong login. Expect HTTP 401 ("not found"),
      # which proves the function runs, reaches the DB, and the rate-limit table
      # exists. A 500 means something's missing (table or secret).
      - name: Smoke test login2
        run: |
          ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZoeHN3eGlsa3V3c3h3cHNkanhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1NzM3MzgsImV4cCI6MjA5NzE0OTczOH0.2aSbvhbkgJyO3GXAbD7o9osqGZWtuco0XRAlVXALr8M"
          code=$(curl -s -o /tmp/body -w "%{http_code}" \
            -X POST "https://$PROJECT_ID.supabase.co/functions/v1/login2" \
            -H "apikey: $ANON" -H "Authorization: Bearer $ANON" \
            -H "Content-Type: application/json" \
            -d '{"name":"__smoke_test_no_such_user__","pin":"000000"}')
          echo "HTTP $code"; cat /tmp/body; echo
          if [ "$code" = "401" ]; then echo "OK: function alive, DB + rate-limit table working."; \
          elif [ "$code" = "500" ]; then echo "FAIL: 500 — missing table or JWT_SECRET."; exit 1; \
          else echo "Unexpected $code (not a hard failure)"; fi

      # Proves a REAL login mints a token the database accepts (catches a wrong
      # JWT_SECRET). Needs repo secrets TEST_NAME/TEST_PIN (any real login).
      # Skips quietly if they're not set.
      - name: Token validity test
        env:
          TEST_NAME: ${{ secrets.TEST_NAME }}
          TEST_PIN: ${{ secrets.TEST_PIN }}
        run: |
          if [ -z "$TEST_NAME" ]; then echo "skipped (TEST_NAME/TEST_PIN not set)"; exit 0; fi
          ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZoeHN3eGlsa3V3c3h3cHNkanhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1NzM3MzgsImV4cCI6MjA5NzE0OTczOH0.2aSbvhbkgJyO3GXAbD7o9osqGZWtuco0XRAlVXALr8M"
          tok=$(curl -s -X POST "https://$PROJECT_ID.supabase.co/functions/v1/login2" \
            -H "apikey: $ANON" -H "Authorization: Bearer $ANON" -H "Content-Type: application/json" \
            -d "{\"name\":\"$TEST_NAME\",\"pin\":\"$TEST_PIN\"}" | jq -r '.token // empty')
          if [ -z "$tok" ]; then echo "FAIL: no token (bad creds or JWT_SECRET missing)"; exit 1; fi
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://$PROJECT_ID.supabase.co/rest/v1/orgs?select=name&limit=1" \
            -H "apikey: $ANON" -H "Authorization: Bearer $tok")
          echo "authenticated request HTTP $code"
          if [ "$code" = "200" ]; then echo "OK: database ACCEPTS the login token — signature valid."; \
          else echo "FAIL: token rejected ($code) — JWT_SECRET is wrong."; exit 1; fi

      # Finish line: an anonymous stranger (anon key only, no login) must get
      # NOTHING from the sensitive tables. Empty result = hole closed.
      - name: Lockdown check (stranger gets nothing)
        run: |
          ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZoeHN3eGlsa3V3c3h3cHNkanhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1NzM3MzgsImV4cCI6MjA5NzE0OTczOH0.2aSbvhbkgJyO3GXAbD7o9osqGZWtuco0XRAlVXALr8M"
          fail=0
          for t in drug_tests incidents residents curfew_log resident_documents checkins; do
            body=$(curl -s "https://$PROJECT_ID.supabase.co/rest/v1/$t?select=id&limit=1" -H "apikey: $ANON" -H "Authorization: Bearer $ANON")
            echo "$t -> $body"
            if [ "$body" = "[]" ]; then echo "  OK locked"; else echo "  !! STILL READABLE"; fail=1; fi
          done
          if [ "$fail" = "1" ]; then echo "FAIL: some tables still readable by a stranger."; exit 1; fi
          echo "ALL LOCKED — strangers get nothing."
