name: Deploy Edge Functions

# Deploys Supabase Edge Functions from this repo so they don't have to be
# pasted into the dashboard editor by hand. Runs on demand, or when a function
# changes on this branch.
on:
  workflow_dispatch:
  push:
    branches: [claude/claude-md-docs-kgcw9e]
    paths: ["supabase/functions/**"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_ID: vhxswxilkuwsxwpsdjxl
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      # login2 is the new token-issuing login; --no-verify-jwt lets the app
      # call it with just the public key (same as a normal login endpoint).
      - run: supabase functions deploy login2 --project-ref "$PROJECT_ID" --no-verify-jwt
